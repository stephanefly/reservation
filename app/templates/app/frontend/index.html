<!DOCTYPE html>
{% load static %}
{% load bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Réservation facile et rapide de photobooth pour vos événements. Photobooth classique, miroir et 360 disponibles.">
    <meta name="keywords" content="photobooth, réservation photobooth, photobooth événements, photobooth mariage, photobooth entreprise">
    <meta name="author" content="Votre Nom d'Entreprise">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="MySelfieBooth">
    <meta property="og:description" content="Profitez de nos meilleurs photobooths pour vos événements.">
    <meta property="og:image" content="{% static 'img/logo.ico' %}">
    <meta property="og:url" content="{% static 'img/logo.ico' %}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <title>MySelfieBooth - Reservation</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.21/css/jquery.dataTables.css">
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{% static 'img/logo.ico' %}">


</head>
<style>
    html,
    body {
        min-height: 100%;
        margin: 0;
        padding: 0;
    }

    .msb-body {
        min-height: 100vh;
        background-image:
            linear-gradient(rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.72)),
            url("{% static 'img/background.jpg' %}");
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        font-family: Arial, sans-serif;
    }

    .msb-navbar {
        background: rgba(8, 8, 8, 0.88);
        border-bottom: 1px solid rgba(244, 220, 127, 0.45);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
    }

    .msb-navbar-container {
        max-width: 1500px;
        padding: 14px 22px;
    }

    .msb-brand {
        font-family: "Arial Black", Gadget, sans-serif;
        font-size: 26px;
        color: #ffffff;
        letter-spacing: -0.5px;
        text-shadow:
            0 1px 4px black,
            2px 1px 2px black,
            8px 4px 20px #fffbdb,
            -3px -1px 11px #fffca6;
    }

    .msb-brand:hover {
        color: #f4dc7f;
    }

    .msb-main-container {
        width: 100%;
        max-width: 1500px;
        min-height: calc(100vh - 140px);
        padding: 24px 18px 40px;
        margin: 0 auto;
    }

    .msb-footer {
        background: rgba(8, 8, 8, 0.88);
        color: rgba(255, 255, 255, 0.72);
        border-top: 1px solid rgba(244, 220, 127, 0.35);
        backdrop-filter: blur(10px);
    }

    .msb-footer-inner {
        padding: 18px;
        font-size: 14px;
    }

    @media (min-width: 768px) {
        .msb-main-container {
            padding: 34px 34px 50px;
        }
    }

    @media (min-width: 1200px) {
        .msb-main-container {
            max-width: 1600px;
        }

        .msb-navbar-container {
            max-width: 1600px;
        }
    }
</style>
<body class="msb-body">

    <nav class="navbar navbar-dark msb-navbar">
        <div class="container-fluid msb-navbar-container">
            <a class="navbar-brand msb-brand" href="#">
                MySelfieBooth
            </a>
        </div>
    </nav>

    <main class="container-fluid msb-main-container">
        {% block content %}
        {% endblock content %}
    </main>



</body>
    <footer class="msb-footer text-center">
        <div class="msb-footer-inner">
            © 2024 MySelfieBooth Tous droits réservés.
        </div>
    </footer>
</html>
